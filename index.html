<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f4f0;font-family:'Georgia','Batang',serif;min-height:100vh;}
button,input,textarea{font-family:'Georgia','Batang',serif;}
.wrap{display:flex;flex-direction:column;align-items:center;padding:40px 16px 60px;}
.header{text-align:center;margin-bottom:28px;}
.header-sub{font-size:11px;letter-spacing:6px;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.header h1{font-size:32px;font-weight:800;color:#111;letter-spacing:-1px;}
.header-line{width:36px;height:3px;background:#111;margin:10px auto 0;border-radius:2px;}
.card{width:100%;max-width:580px;background:#fff;border:1.5px solid #e5e7eb;border-radius:18px;box-shadow:0 6px 32px rgba(0,0,0,.07);overflow:hidden;}
.footer-note{font-size:11px;color:#ccc;margin-top:20px;}
.btn-dark{width:100%;padding:14px;background:#111827;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;}
.btn-dark:hover{background:#374151;}
.btn-outline{flex:1;padding:13px;background:#fff;color:#111;border:1.5px solid #111;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;}
.btn-ghost{background:none;border:1px solid #e5e7eb;border-radius:6px;padding:4px 12px;font-size:12px;color:#6b7280;cursor:pointer;}
.back-btn{background:none;border:none;font-size:20px;cursor:pointer;color:#6b7280;padding:0;}
.section{padding:24px;}
.row{display:flex;align-items:center;gap:10px;}
.grade-card{text-align:center;padding:24px 20px;border-radius:12px;margin-bottom:22px;}
.grade-pct{font-size:52px;font-weight:800;line-height:1;}
.grade-sub{font-size:15px;margin-top:6px;color:#374151;}
.grade-label{font-size:18px;margin-top:4px;}
/* Count selector */
.count-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}
.count-btn{flex:1;min-width:60px;padding:9px 6px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fafafa;font-size:13px;font-weight:600;color:#6b7280;cursor:pointer;text-align:center;transition:all .15s;}
.count-btn:hover{border-color:#999;}
.count-btn.active{border:2px solid #111827;background:#111827;color:#fff;}
/* Mode buttons */
.mode-btn{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:12px;cursor:pointer;border:1.5px solid #e5e7eb;background:#fafafa;text-align:left;width:100%;}
.mode-btn:hover{border-color:#111;background:#fff;}
.mode-icon{font-size:24px;}
.mode-title{font-size:15px;font-weight:700;color:#111;}
.mode-desc{font-size:12px;color:#9ca3af;margin-top:2px;}
.mode-arrow{margin-left:auto;color:#d1d5db;font-size:18px;}
.tag{font-size:10px;color:#9ca3af;background:#f3f4f6;border-radius:4px;padding:1px 7px;}
.prog-wrap{flex:1;height:6px;background:#f3f4f6;border-radius:99px;overflow:hidden;}
.prog-bar{height:100%;background:#111827;border-radius:99px;transition:width .3s;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.choice-btn{padding:12px 14px;border-radius:10px;cursor:pointer;text-align:left;border:1.5px solid #e5e7eb;background:#fafafa;color:#374151;font-size:14px;display:flex;align-items:center;gap:8px;transition:all .15s;width:100%;}
.choice-btn:hover{border-color:#999;}
.choice-btn.selected{border:2px solid #111;background:#111;color:#fff;font-weight:700;}
.choice-btn.correct{border:2px solid #86efac!important;background:#dcfce7!important;color:#16a34a!important;font-weight:700;}
.choice-btn.wrong{border:2px solid #fca5a5!important;background:#fee2e2!important;color:#dc2626!important;font-weight:700;}
.result-item{border-radius:12px;overflow:hidden;margin-bottom:10px;}
.result-header{padding:10px 14px;display:flex;align-items:center;gap:8px;}
.result-choices{padding:10px 14px;display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.rc{padding:7px 10px;border-radius:8px;font-size:13px;display:flex;gap:6px;align-items:center;border:1px solid #e5e7eb;}
.divider{display:flex;align-items:center;gap:10px;margin:14px 0;}
.divider-line{flex:1;height:1px;background:#e5e7eb;}
.divider-text{font-size:11px;color:#9ca3af;}
.pill-green{font-size:12px;background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:99px;padding:3px 10px;}
.pill-red{font-size:12px;background:#fff5f5;color:#dc2626;border:1px solid #fecaca;border-radius:99px;padding:3px 10px;}
.typing-input{width:100%;padding:14px 16px;font-size:16px;border:2px solid #d1d5db;border-radius:10px;outline:none;background:#fafafa;color:#111;transition:border-color .2s;}
.typing-input:focus{border-color:#111;}
.typing-input.correct{border-color:#16a34a!important;background:#f0fdf4;}
.typing-input.wrong{border-color:#dc2626!important;background:#fff5f5;}
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-btn{padding:13px 12px;border-radius:10px;cursor:pointer;border:1.5px solid #e5e7eb;background:#fafafa;font-size:13px;text-align:center;transition:all .15s;width:100%;}
.match-btn:hover{border-color:#999;}
.match-btn.selected{border:2px solid #2563eb;background:#eff6ff;color:#2563eb;font-weight:700;}
.match-btn.matched{border:2px solid #86efac;background:#dcfce7;color:#16a34a;font-weight:700;cursor:default;}
.match-btn.wrong-flash{border:2px solid #fca5a5;background:#fee2e2;animation:flash .4s ease;}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.4}}
.hist-item{padding:14px 16px;border-radius:10px;border:1.5px solid #e5e7eb;background:#fafafa;margin-bottom:8px;}
.hist-row{display:flex;justify-content:space-between;align-items:center;}
.hist-mode{font-size:12px;color:#6b7280;}
.hist-score{font-size:20px;font-weight:800;}
.hist-date{font-size:11px;color:#9ca3af;margin-top:4px;}
.saved-btn{width:100%;padding:16px 18px;background:linear-gradient(135deg,#1e293b 0%,#334155 100%);color:#fff;border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;gap:12px;margin-bottom:16px;text-align:left;}
/* Login */
.user-avatar{width:64px;height:64px;border-radius:99px;background:#111827;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;}
.user-chip{display:inline-flex;align-items:center;gap:6px;background:#f3f4f6;border:1.5px solid #e5e7eb;border-radius:99px;padding:5px 14px 5px 10px;font-size:13px;color:#374151;cursor:pointer;}
.user-chip:hover{background:#e5e7eb;}

<script>
const USER_KEY  = 'vocab-user';
const WORDS_KEY = 'vocab-words';
const HIST_KEY  = 'vocab-history';
const COUNT_KEY = 'vocab-count';
const STARS_KEY = 'vocab-stars';
const SEEN_KEY  = 'vocab-seen';
const LABELS    = ['①','②','③','④'];

// ── Supabase ──────────────────────────────────────────────
const _sb = supabase.createClient(
  'https://zfjvtjglosbyfkyaenas.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpmanZ0amdsb3NieWZreWFlbmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mzg3MjEsImV4cCI6MjA5MjAxNDcyMX0.Db7EtZt7MTofZdR_B8fYJHtzFp-8-tyZ-ytXNFXeG0E'
);

async function sbLoadWords(username){
  const {data,error} = await _sb.from('word_lists').select('words_text').eq('username',username).single();
  if(error||!data) return '';
  return data.words_text||'';
}
async function sbSaveWords(username, text){
  await _sb.from('word_lists').upsert({username, words_text:text, updated_at:new Date().toISOString()},{onConflict:'username'});
}
async function sbLoadAllWords(){
  const {data} = await _sb.from('word_lists').select('username,words_text');
  return data||[];
}

// History, count, stars stay local
function wKey(){ return (localStorage.getItem(USER_KEY)||'guest')+':'+WORDS_KEY; }
function hKey(){ return (localStorage.getItem(USER_KEY)||'guest')+':'+HIST_KEY; }
function cKey(){ return (localStorage.getItem(USER_KEY)||'guest')+':'+COUNT_KEY; }
function sKey(){ return (localStorage.getItem(USER_KEY)||'guest')+':'+STARS_KEY; }
function seenKey(){ return (localStorage.getItem(USER_KEY)||'guest')+':'+SEEN_KEY; }

// ── Stars helpers ─────────────────────────────────────────
function getStars(){ try{ return new Set(JSON.parse(localStorage.getItem(sKey())||'[]')); }catch(e){ return new Set(); } }
function toggleStar(en){
  const s=getStars();
  s.has(en)?s.delete(en):s.add(en);
  localStorage.setItem(sKey(),JSON.stringify([...s]));
}

// ── Seen words helpers ────────────────────────────────────
// Tracks which words have been tested at least once this "round"
function getSeenWords(){ try{ return new Set(JSON.parse(localStorage.getItem(seenKey())||'[]')); }catch(e){ return new Set(); } }
function markWordsAsSeen(words){
  const seen=getSeenWords();
  words.forEach(w=>seen.add(w.en));
  localStorage.setItem(seenKey(),JSON.stringify([...seen]));
}
function resetSeenWords(){ localStorage.removeItem(seenKey()); }
function getSeenCount(){ return getSeenWords().size; }

// ── Utilities ─────────────────────────────────────────────
function parseWords(text){
  const lines = text.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  const words=[]; let i=0;
  while(i<lines.length){
    const line=lines[i];
    const s=line.replace(/^\d+[\.\)]\s*/,'').trim();
    const sep=s.includes(' - ')?' - ':s.includes(':') ? ':' : null;
    if(sep){ const si=s.indexOf(sep),en=s.slice(0,si).trim(),kr=s.slice(si+sep.length).trim(); if(en&&kr) words.push({en,kr}); i++;continue;}
    const nx=lines[i+1];
    if(nx&&!/^\d+[\.\)]/.test(nx)){ if(s&&nx.trim()) words.push({en:s,kr:nx.trim()}); i+=2;continue;}
    i++;
  }
  return words;
}
function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

// Pick N words — unseen first, then random from seen
function pickWords(words, count){
  if(count===0||count>=words.length) return shuffle([...words]);
  const seen=getSeenWords();
  const unseen=words.filter(w=>!seen.has(w.en));
  const seenWords=words.filter(w=>seen.has(w.en));
  if(unseen.length>=count) return shuffle(unseen).slice(0,count);
  // Not enough unseen — take all unseen + fill rest from seen
  const need=count-unseen.length;
  return shuffle([...unseen, ...shuffle(seenWords).slice(0,need)]);
}

function getActiveWords(){
  if(_count==='star'){
    const stars=getStars();
    const starred=_words.filter(w=>stars.has(w.en));
    return starred.length>=2?shuffle(starred):shuffle([..._words]);
  }
  return pickWords(_words,_count);
}

function genQuestions(words){
  if(words.length<2) return [];
  return shuffle(words).map((w,i)=>{
    const dir=i%2===0?'en2kr':'kr2en';
    const prompt=dir==='en2kr'?w.en:w.kr, answer=dir==='en2kr'?w.kr:w.en;
    const others=shuffle(words.filter(x=>x.en!==w.en)).slice(0,3);
    const wrong=others.map(x=>dir==='en2kr'?x.kr:x.en);
    return {id:i,dir,prompt,answer,choices:shuffle([answer,...wrong]),hint:dir==='en2kr'?'🇺🇸→🇰🇷':'🇰🇷→🇺🇸'};
  });
}

function saveHistory(mode,correct,total,done=true,testedWords=[],wrongWords=[]){
  if(total===0) return;
  // Mark tested words as seen (only on completion, not mid-test)
  if(done && testedWords.length>0){
    markWordsAsSeen(testedWords);
    // If all words seen, auto-reset for next round
    if(getSeenCount()>=_words.length) resetSeenWords();
  }
  const hist=JSON.parse(localStorage.getItem(hKey())||'[]');
  hist.unshift({mode,correct,total,pct:Math.round(correct/total*100),done,
    tested:testedWords,wrongs:wrongWords,
    date:new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})});
  if(hist.length>50) hist.pop();
  localStorage.setItem(hKey(),JSON.stringify(hist));
}

// ── Element helpers ────────────────────────────────────────
function el(tag,attr,children){
  const e=document.createElement(tag);
  Object.entries(attr||{}).forEach(([k,v])=>{
    if(k==='class') e.className=v;
    else if(k==='style') e.style.cssText=v;
    else if(k.startsWith('on')) e.addEventListener(k.slice(2).toLowerCase(),v);
    else e[k]=v;
  });
  (children||[]).forEach(c=>{ if(c!=null) e.append(typeof c==='string'?c:c); });
  return e;
}
const div=(a,c)=>el('div',a,c);
const btn=(a,c)=>el('button',a,c);
const span=(a,c)=>el('span',a,c);
const p=(a,c)=>el('p',a,c);

// ── Excel Export ───────────────────────────────────────────
async function exportToExcel(){
  const wb = XLSX.utils.book_new();
  let rows = [];
  try{
    rows = await sbLoadAllWords();
  }catch(e){
    // fallback to localStorage
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key&&key.endsWith(':'+WORDS_KEY)){
        const user=key.slice(0,key.length-(':'+WORDS_KEY).length);
        rows.push({username:user, words_text:localStorage.getItem(key)||''});
      }
    }
  }
  if(!rows.length){ alert('저장된 단어가 없어요!'); return; }
  rows.forEach(({username, words_text})=>{
    const words=parseWords(words_text||'');
    if(!words.length) return;
    const data=[['#','영어','한국어']];
    words.forEach((w,i)=>data.push([i+1,w.en,w.kr]));
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:4},{wch:24},{wch:30}];
    XLSX.utils.book_append_sheet(wb,ws,username.slice(0,31));
  });
  if(!wb.SheetNames.length){ alert('저장된 단어가 없어요!'); return; }
  const date=new Date().toLocaleDateString('ko-KR',{year:'2-digit',month:'2-digit',day:'2-digit'}).replace(/\. /g,'-').replace('.','');
  XLSX.writeFile(wb,`단어장_${date}.xlsx`);
}

// ── Count selector widget ──────────────────────────────────
function makeCountSelector(){
  const wrapper=div({});
  wrapper.appendChild(p({style:'font-size:12px;color:#6b7280;margin-bottom:8px;font-weight:600'},['📌 문제 수 선택']));
  const row=div({class:'count-row'});
  const starCount=_words.filter(w=>getStars().has(w.en)).length;
  const counts=[
    {n:20,label:'20개'},{n:50,label:'50개'},{n:100,label:'100개'},
    {n:0,label:'전체'},{n:'star',label:'⭐ '+starCount+'개'},
  ];
  counts.forEach(({n,label})=>{
    const available=n==='star'?starCount>=2:(n===0||_words.length>=n);
    const b=btn({
      class:'count-btn'+((_count===n)?' active':''),
      style:available?'':'opacity:.35;cursor:not-allowed',
      onClick:()=>{
        if(!available) return;
        setSavedCount(n);
        wrapper.querySelectorAll('.count-btn').forEach(x=>x.classList.remove('active'));
        b.classList.add('active');
      }
    },[label+(n>0&&n!=='star'&&_words.length<n?` (${_words.length}개)`:'')]);
    row.appendChild(b);
  });
  wrapper.appendChild(row);
  if(_count==='star'&&starCount<2) wrapper.appendChild(p({style:'font-size:11px;color:#f59e0b;margin-top:4px'},['⚠ 별표 단어가 2개 이상 있어야 해요']));

  // ── Seen progress bar ──
  if(_count!=='star' && _count!==0){
    const seen=getSeenCount();
    const total=_words.length;
    const pct=total>0?Math.round(seen/total*100):0;
    const unseen=total-seen;
    const progressWrap=div({style:'margin-top:12px'});
    const labelRow=div({style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:5px'});
    labelRow.innerHTML=`
      <span style="font-size:12px;color:#6b7280">📚 학습 진행률</span>
      <span style="font-size:12px;font-weight:700;color:#111">${seen} / ${total}</span>`;
    const barBg=div({style:'height:8px;background:#f3f4f6;border-radius:99px;overflow:hidden'});
    const barFill=div({style:`height:100%;width:${pct}%;background:${pct===100?'#16a34a':'#111827'};border-radius:99px;transition:width .4s`});
    barBg.appendChild(barFill);
    progressWrap.appendChild(labelRow);
    progressWrap.appendChild(barBg);

    const subRow=div({style:'display:flex;justify-content:space-between;margin-top:5px'});
    subRow.innerHTML=`
      <span style="font-size:11px;color:#6b7280">아직 안 본 단어: <strong style="color:#111">${unseen}개</strong></span>
      ${seen>0?`<button onclick="if(confirm('진행률을 초기화할까요?')){resetSeenWords();render('mode');}" style="font-size:11px;color:#9ca3af;background:none;border:none;cursor:pointer;text-decoration:underline;">초기화</button>`:''}`;
    progressWrap.appendChild(subRow);

    if(pct===100){
      const badge=div({style:'margin-top:6px;padding:6px 10px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;font-size:12px;color:#16a34a;text-align:center'});
      badge.textContent='🎉 모든 단어를 1번씩 봤어요! 다시 처음부터 시작해요';
      progressWrap.appendChild(badge);
    }
    wrapper.appendChild(progressWrap);
  }
  return wrapper;
}

// ── ONE BY ONE ────────────────────────────────────────────
function renderOne(){
  const pool=getActiveWords();
  const questions=genQuestions(pool);
  let idx=0,score={correct:0,wrong:0},phase='question',wrongChoice=null;
  const wrongWords=[];
  setActiveTest('한 문제씩',()=>({correct:score.correct,answered:idx}));
  function draw(){
    const sec=div({class:'section'});
    if(idx>=questions.length){
      clearActiveTest();
      const pct=Math.round(score.correct/questions.length*100);
      saveHistory('한 문제씩',score.correct,questions.length,true,pool,wrongWords);
      renderDone(sec,pct,score.correct,questions.length,()=>{clearActiveTest();render('mode');},()=>render('one'));
      app.innerHTML='';app.appendChild(sec);return;
    }
    const q=questions[idx];
    renderProgressRow(sec,idx,questions.length,score,()=>{ if(idx>0) saveHistory('한 문제씩',score.correct,idx,false,pool.slice(0,idx),wrongWords); clearActiveTest(); render('mode'); });
    const qcard=div({style:'text-align:center;padding:32px 20px;background:#fafafa;border-radius:14px;border:1.5px solid #e5e7eb;margin-bottom:20px'});
    qcard.innerHTML=`<span class="tag">${q.hint}</span><div style="font-size:26px;font-weight:800;color:#111;margin-top:12px">${q.prompt}</div>`;
    sec.appendChild(qcard);
    const grid=div({class:'choices'});
    q.choices.forEach((choice,ci)=>{
      const cls='choice-btn'+(phase==='wrong'&&choice===q.answer?' correct':phase==='wrong'&&choice===wrongChoice?' wrong':'');
      const b=btn({class:cls});
      b.innerHTML=`<span style="opacity:.4;font-size:13px">${LABELS[ci]}</span>${choice}${phase==='wrong'&&choice===q.answer?' <span style="margin-left:auto">✓</span>':''}`;
      if(phase==='question') b.addEventListener('click',()=>{
        if(choice===q.answer){score.correct++;idx++;phase='question';}
        else{
          wrongChoice=choice;phase='wrong';score.wrong++;
          if(!wrongWords.find(w=>w.en===q.id||w.prompt===q.prompt)){
            const orig=pool.find(w=>(q.dir==='en2kr'?w.en:w.kr)===q.prompt);
            if(orig) wrongWords.push(orig);
          }
        }
        draw();
      });
      grid.appendChild(b);
    });
    sec.appendChild(grid);
    if(phase==='wrong') sec.appendChild(btn({class:'btn-dark',style:'margin-top:16px',onClick:()=>{idx++;phase='question';wrongChoice=null;draw();}},['다음 문제 →']));
    app.innerHTML='';app.appendChild(sec);
  }
  draw();
}

function renderTyping(){
  const pool=getActiveWords();

  let idx=0,score={correct:0,wrong:0},state='input';
  const wrongWords=[];
  setActiveTest('직접 입력',()=>({correct:score.correct,answered:idx}));
  function norm(s){return s.trim().toLowerCase().replace(/\s+/g,' ');}
  function draw(){
    const sec=div({class:'section'});
    if(idx>=qs.length){
      clearActiveTest();
      const pct=Math.round(score.correct/qs.length*100);
      saveHistory('직접 입력',score.correct,qs.length,true,pool,wrongWords);
      renderDone(sec,pct,score.correct,qs.length,()=>{clearActiveTest();render('mode');},()=>render('typing'));
      app.innerHTML='';app.appendChild(sec);return;
    }
    const q=qs[idx];
    renderProgressRow(sec,idx,qs.length,score,()=>{ if(idx>0) saveHistory('직접 입력',score.correct,idx,false,pool.slice(0,idx),wrongWords); clearActiveTest(); render('mode'); });
    const qcard=div({style:'text-align:center;padding:28px 20px;background:#fafafa;border-radius:14px;border:1.5px solid #e5e7eb;margin-bottom:20px'});
    qcard.innerHTML=`<span class="tag">${q.hint}</span><div style="font-size:24px;font-weight:800;color:#111;margin-top:10px">${q.prompt}</div>`;
    sec.appendChild(qcard);
    const inputCls='typing-input'+(state==='correct'?' correct':state==='wrong'?' wrong':'');
    const ti=el('input',{type:'text',class:inputCls,placeholder:'정답을 입력하세요...',disabled:state!=='input'});
    sec.appendChild(ti);
    if(state==='wrong') sec.appendChild(p({style:'font-size:13px;color:#dc2626;margin-top:8px'},['❌ 정답: '+q.answer]));
    if(state==='correct') sec.appendChild(p({style:'font-size:13px;color:#16a34a;margin-top:8px'},['✅ 정답!']));
    function check(){
      if(norm(ti.value)===norm(q.answer)){score.correct++;state='correct';}
      else{score.wrong++;state='wrong'; if(!wrongWords.find(w=>w.en===q.word.en)) wrongWords.push(q.word);}
      draw();
    }
    if(state==='input'){
      ti.addEventListener('keydown',e=>{ if(e.key==='Enter') check(); });
      sec.appendChild(btn({class:'btn-dark',style:'margin-top:14px',onClick:check},['확인 (Enter)']));
    } else {
      sec.appendChild(btn({class:'btn-dark',style:'margin-top:14px',onClick:()=>{idx++;state='input';draw();}},['다음 문제 →']));
    }
    app.innerHTML='';app.appendChild(sec);
    if(state==='input') setTimeout(()=>ti.focus(),50);
  }
  draw();
}

// ── MATCH ─────────────────────────────────────────────────
function renderMatch(){
  const GROUP=4;
  const pool=getActiveWords();
  const allWords=shuffle(pool);
  let groupIdx=0,totalCorrect=0;
  const totalGroups=Math.ceil(allWords.length/GROUP);

  function doGroup(){
    if(groupIdx>=totalGroups){
      saveHistory('짝 맞추기',allWords.length,allWords.length,true,allWords,[]);
      const sec=div({class:'section'});
      const g=gradeInfo(100);
      const gc=div({class:'grade-card',style:`background:${g.bg};border:1.5px solid ${g.color}33`});
      gc.innerHTML=`<div class="grade-pct" style="color:${g.color}">🎉</div><div class="grade-sub" style="font-size:18px;font-weight:700;margin-top:8px">전부 맞혔어요!</div><div class="grade-label" style="color:${g.color}">${g.label}</div>`;
      sec.appendChild(gc);
      const row=div({style:'display:flex;gap:10px'});
      row.appendChild(btn({class:'btn-outline',onClick:()=>render('mode')},['← 뒤로']));
      row.appendChild(btn({class:'btn-outline',onClick:()=>render('match')},['다시 풀기 🔄']));
      sec.appendChild(row);
      app.innerHTML='';app.appendChild(sec);return;
    }
    const group=allWords.slice(groupIdx*GROUP,(groupIdx+1)*GROUP);
    const leftItems=shuffle([...group]),rightItems=shuffle([...group]);
    let selLeft=null,selRight=null,matched=new Set(),wrongPair=null,wrongTimer=null;
    function draw(){
      const sec=div({class:'section'});
      const topRow=div({class:'row',style:'margin-bottom:16px'});
      topRow.appendChild(btn({class:'back-btn',onClick:()=>render('mode')},['←']));
      topRow.appendChild(span({style:'font-size:16px;font-weight:700;color:#111'},['🔗 짝 맞추기']));
      topRow.appendChild(span({style:'font-size:12px;color:#9ca3af;margin-left:auto'},[`${groupIdx+1} / ${totalGroups} 세트`]));
      sec.appendChild(topRow);
      sec.appendChild(p({style:'font-size:13px;color:#6b7280;margin-bottom:16px;text-align:center'},['단어와 뜻을 하나씩 클릭해서 연결하세요']));
      const grid=div({class:'match-grid'});
      const lh=div({style:'font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;padding:4px 0;text-align:center'}); lh.textContent='English';
      const rh=div({style:'font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:1px;padding:4px 0;text-align:center'}); rh.textContent='한국어';
      grid.appendChild(lh);grid.appendChild(rh);
      leftItems.forEach((w,i)=>{
        const isM=matched.has(w.en),isSL=selLeft&&selLeft.en===w.en,isW=wrongPair&&wrongPair.left.en===w.en;
        const lb=btn({class:'match-btn'+(isM?' matched':isSL?' selected':isW?' wrong-flash':'')}); lb.textContent=w.en;
        if(!isM) lb.addEventListener('click',()=>{ selLeft=w; if(selRight){ if(selLeft.en===selRight.en){matched.add(selLeft.en);totalCorrect++;selLeft=null;selRight=null;}else{wrongPair={left:selLeft,right:selRight};selLeft=null;selRight=null;clearTimeout(wrongTimer);wrongTimer=setTimeout(()=>{wrongPair=null;draw();},500);} } draw(); });
        grid.appendChild(lb);
        const rw=rightItems[i],isMR=matched.has(rw.en),isSR=selRight&&selRight.en===rw.en,isWR=wrongPair&&wrongPair.right.en===rw.en;
        const rb=btn({class:'match-btn'+(isMR?' matched':isSR?' selected':isWR?' wrong-flash':'')}); rb.textContent=rw.kr;
        if(!isMR) rb.addEventListener('click',()=>{ selRight=rw; if(selLeft){ if(selLeft.en===selRight.en){matched.add(selLeft.en);totalCorrect++;selLeft=null;selRight=null;}else{wrongPair={left:selLeft,right:selRight};selLeft=null;selRight=null;clearTimeout(wrongTimer);wrongTimer=setTimeout(()=>{wrongPair=null;draw();},500);} } draw(); });
        grid.appendChild(rb);
      });
      sec.appendChild(grid);
      if(matched.size===group.length){
        sec.appendChild(btn({class:'btn-dark',style:'margin-top:20px',onClick:()=>{groupIdx++;doGroup();}},[groupIdx+1<totalGroups?'다음 세트 →':'결과 보기 →']));
      }
      app.innerHTML='';app.appendChild(sec);
    }
    draw();
  }
  doGroup();
}

// ── FULL TEST ─────────────────────────────────────────────
function renderTest(){
  const pool=getActiveWords();
  const questions=genQuestions(pool);
  const selected={};let done=false;
  setActiveTest('시험지',()=>{ const ans=Object.keys(selected).length; const cor=questions.filter(q=>selected[q.id]===q.answer).length; return {correct:cor,answered:ans}; });
  function draw(){
    const sec=div({class:'section'});
    if(done){
      clearActiveTest();
      const correct=questions.filter(q=>selected[q.id]===q.answer).length;
      const pct=Math.round(correct/questions.length*100);
      const wrongWords=questions.filter(q=>selected[q.id]!==q.answer).map(q=>pool.find(w=>(q.dir==='en2kr'?w.en:w.kr)===q.prompt)).filter(Boolean);
      saveHistory('시험지',correct,questions.length,true,pool,wrongWords);
      const g=gradeInfo(pct);
      const gc=div({class:'grade-card',style:`background:${g.bg};border:1.5px solid ${g.color}33`});
      gc.innerHTML=`<div class="grade-pct" style="color:${g.color}">${pct}%</div><div class="grade-sub">${correct} / ${questions.length} 정답</div><div class="grade-label" style="color:${g.color}">${g.label}</div>`;
      sec.appendChild(gc);
      questions.forEach((q,idx)=>{
        const uc=selected[q.id],isC=uc===q.answer;
        const ri=div({class:'result-item',style:`border:1.5px solid ${isC?'#bbf7d0':'#fecaca'};background:${isC?'#f0fdf4':'#fff5f5'}`});
        const rh=div({class:'result-header',style:`border-bottom:1px solid ${isC?'#bbf7d0':'#fecaca'}`});
        rh.innerHTML=`<span style="font-size:12px;color:#9ca3af">${idx+1}.</span><span class="tag">${q.hint}</span><span style="font-size:15px;font-weight:700;color:#111">${q.prompt}</span><span style="margin-left:auto">${isC?'✅':'❌'}</span>`;
        ri.appendChild(rh);
        const rc=div({class:'result-choices'});
        q.choices.forEach((ch,ci)=>{
          const isA=ch===q.answer,isU=ch===uc;
          const d=div({class:'rc',style:`background:${isA?'#dcfce7':isU&&!isC?'#fee2e2':'transparent'};color:${isA?'#16a34a':isU&&!isC?'#dc2626':'#6b7280'};border:1px solid ${isA?'#86efac':isU&&!isC?'#fca5a5':'#e5e7eb'};font-weight:${isA||(isU&&!isC)?700:400}`});
          d.innerHTML=`<span style="opacity:.4;font-size:12px">${LABELS[ci]}</span>${ch}${isA?'<span style="margin-left:auto">✓</span>':''}`;
          rc.appendChild(d);
        });
        ri.appendChild(rc);sec.appendChild(ri);
      });
      const row=div({style:'display:flex;gap:10px;margin-top:8px'});
      row.appendChild(btn({class:'btn-outline',onClick:()=>render('mode')},['← 뒤로']));
      row.appendChild(btn({class:'btn-outline',onClick:()=>render('test')},['다시 풀기 🔄']));
      sec.appendChild(row);app.innerHTML='';app.appendChild(sec);return;
    }
    const answered=Object.keys(selected).length;
    const topRow=div({class:'row',style:'margin-bottom:20px'});
    topRow.appendChild(btn({class:'back-btn',onClick:()=>{ const ans=Object.keys(selected).length; if(ans>0) saveHistory('시험지',questions.filter(q=>selected[q.id]===q.answer).length,ans,false); clearActiveTest(); render('mode'); }},['←']));
    topRow.appendChild(span({style:'font-size:16px;font-weight:700;color:#111'},['📝 시험지']));
    topRow.appendChild(span({style:'font-size:13px;color:#6b7280;margin-left:auto'},[answered+' / '+questions.length]));
    sec.appendChild(topRow);
    const list=div({style:'display:flex;flex-direction:column;gap:20px'});
    questions.forEach((q,idx)=>{
      const qd=div({});
      const qrow=div({style:'display:flex;align-items:baseline;gap:8px;margin-bottom:10px'});
      qrow.innerHTML=`<span style="font-size:13px;color:#9ca3af;min-width:22px">${idx+1}.</span><div><span class="tag">${q.hint}</span> <span style="font-size:17px;font-weight:700;color:#111">${q.prompt}</span></div>`;
      qd.appendChild(qrow);
      const cg=div({class:'choices',style:'padding-left:30px'});
      q.choices.forEach((ch,ci)=>{
        const isSel=selected[q.id]===ch;
        const b=btn({class:'choice-btn'+(isSel?' selected':''),onClick:()=>{selected[q.id]=ch;draw();}});
        b.innerHTML=`<span style="opacity:.45;font-size:13px">${LABELS[ci]}</span>${ch}`;
        cg.appendChild(b);
      });
      qd.appendChild(cg);list.appendChild(qd);
    });
    sec.appendChild(list);
    if(answered<questions.length) sec.appendChild(p({style:'text-align:center;font-size:12px;color:#f59e0b;margin-top:20px;margin-bottom:4px'},['⚠ '+(questions.length-answered)+'문제 아직 선택 안 됨']));
    sec.appendChild(btn({class:'btn-dark',style:'margin-top:'+(answered<questions.length?'8':'24')+'px',onClick:()=>{done=true;draw();}},['채점하기 ✓']));
    app.innerHTML='';app.appendChild(sec);
  }
  draw();
}

// ── HISTORY ───────────────────────────────────────────────
function renderHistory(){
  const sec=div({class:'section'});
  const topRow=div({class:'row',style:'margin-bottom:20px'});
  topRow.appendChild(btn({class:'back-btn',onClick:()=>render(_words.length>=2?'mode':'input')},['←']));
  topRow.appendChild(span({style:'font-size:16px;font-weight:700;color:#111'},['📊 시험 히스토리']));
  topRow.appendChild(btn({class:'btn-ghost',style:'margin-left:auto',onClick:()=>{ if(confirm('히스토리를 모두 삭제할까요?')){localStorage.removeItem(hKey());render('history');} }},['전체 삭제']));
  sec.appendChild(topRow);

  const hist=JSON.parse(localStorage.getItem(hKey())||'[]');
  if(!hist.length){
    sec.appendChild(p({style:'text-align:center;color:#9ca3af;font-size:14px;padding:40px 0'},['아직 기록이 없어요']));
  } else {
    const icons={'한 문제씩':'🎯','직접 입력':'✍️','짝 맞추기':'🔗','시험지':'📝'};

    hist.forEach(h=>{
      const g=gradeInfo(h.pct);
      const isDone=h.done!==false;
      const hasTested=h.tested&&h.tested.length>0;
      const item=div({class:'hist-item',style:'cursor:pointer'});

      // ── Summary row ──
      const summary=div({});
      summary.innerHTML=`
        <div class="hist-row">
          <span class="hist-mode">${icons[h.mode]||'📝'} ${h.mode}${!isDone?' <span style="font-size:10px;background:#fef9c3;color:#b45309;border:1px solid #fde68a;border-radius:4px;padding:1px 6px;margin-left:4px">중단</span>':''}</span>
          <span style="display:flex;align-items:center;gap:6px">
            <span class="hist-score" style="color:${g.color}">${h.pct}%</span>
            <span class="hist-toggle" style="font-size:11px;color:#9ca3af">상세 ▾</span>
          </span>
        </div>
        <div class="hist-row" style="margin-top:4px">
          <span class="hist-date">${h.date}</span>
          <span style="font-size:13px;color:#6b7280">${h.correct} / ${h.total} 정답</span>
        </div>`;
      item.appendChild(summary);

      // ── Detail panel ──
      const detail=div({style:'display:none;margin-top:12px;border-top:1px solid #e5e7eb;padding-top:12px'});

      function buildDetail(){
        detail.innerHTML='';
        const wrongSet=new Set((h.wrongs||[]).map(w=>w.en));

        // Wrongs section
        if(h.wrongs&&h.wrongs.length>0){
          detail.appendChild(p({style:'font-size:11px;font-weight:700;color:#dc2626;margin-bottom:6px;letter-spacing:.5px'},['❌ 틀린 단어 '+h.wrongs.length+'개']));
          h.wrongs.forEach(w=>{
            const isStarred=getStars().has(w.en);
            const row=div({style:'display:grid;grid-template-columns:1fr 1fr 32px;align-items:center;padding:7px 10px;border-radius:6px;background:#fff5f5;border:1px solid #fecaca;margin-bottom:3px'});
            const es=document.createElement('span'); es.style.cssText='font-size:13px;font-weight:600;color:#111'; es.textContent=w.en;
            const ks=document.createElement('span'); ks.style.cssText='font-size:13px;color:#374151'; ks.textContent=w.kr;
            const sb=btn({style:`background:none;border:none;font-size:16px;cursor:pointer;padding:0;opacity:${isStarred?1:.3}`,
              onClick:e=>{ e.stopPropagation(); toggleStar(w.en); buildDetail(); }
            },[isStarred?'⭐':'☆']);
            row.appendChild(es); row.appendChild(ks); row.appendChild(sb);
            detail.appendChild(row);
          });
        }

        // All tested words section
        if(hasTested){
          const label=h.wrongs&&h.wrongs.length>0?'📋 출제된 전체 단어 '+h.tested.length+'개':'✅ 출제된 단어 '+h.tested.length+'개 (전부 정답!)';
          detail.appendChild(p({style:'font-size:11px;font-weight:700;color:#6b7280;margin-top:'+(h.wrongs&&h.wrongs.length?'12':'0')+'px;margin-bottom:6px;letter-spacing:.5px'},[label]));
          h.tested.forEach(w=>{
            const isWrong=wrongSet.has(w.en);
            const isStarred=getStars().has(w.en);
            const row=div({style:`display:grid;grid-template-columns:1fr 1fr 20px 32px;align-items:center;padding:6px 10px;border-radius:6px;background:${isWrong?'#fff5f5':'#f9fafb'};border:1px solid ${isWrong?'#fecaca':'#f3f4f6'};margin-bottom:3px`});
            const es=document.createElement('span'); es.style.cssText='font-size:12px;font-weight:600;color:#111'; es.textContent=w.en;
            const ks=document.createElement('span'); ks.style.cssText='font-size:12px;color:#374151'; ks.textContent=w.kr;
            const badge=document.createElement('span'); badge.style.cssText='font-size:12px'; badge.textContent=isWrong?'❌':'✅';
            const sb=btn({style:`background:none;border:none;font-size:15px;cursor:pointer;padding:0;opacity:${isStarred?1:.3}`,
              onClick:e=>{ e.stopPropagation(); toggleStar(w.en); buildDetail(); }
            },[isStarred?'⭐':'☆']);
            row.appendChild(es); row.appendChild(ks); row.appendChild(badge); row.appendChild(sb);
            detail.appendChild(row);
          });
        }
      }

      buildDetail();
      item.appendChild(detail);

      // Toggle on click
      item.addEventListener('click',()=>{
        const isOpen=detail.style.display!=='none';
        detail.style.display=isOpen?'none':'block';
        const toggle=summary.querySelector('.hist-toggle');
        if(toggle) toggle.textContent=isOpen?'상세 ▾':'접기 ▴';
      });

      sec.appendChild(item);
    });
  }
  app.appendChild(sec);
}

// ── Shared render helpers ──────────────────────────────────
function renderProgressRow(sec,idx,total,score,onBack){
  const topRow=div({class:'row',style:'margin-bottom:16px'});
  const backHandler=onBack||function(){ clearActiveTest(); render('mode'); };
  topRow.appendChild(btn({class:'back-btn',onClick:backHandler},['←']));
  const pw=div({class:'prog-wrap'}); pw.appendChild(div({class:'prog-bar',style:`width:${(idx/total)*100}%`})); topRow.appendChild(pw);
  topRow.appendChild(span({style:'font-size:12px;color:#9ca3af;white-space:nowrap'},[(idx+1)+' / '+total]));
  sec.appendChild(topRow);
  const pills=div({style:'display:flex;gap:8px;margin-bottom:20px'});
  pills.innerHTML=`<span class="pill-green">✓ ${score.correct}</span><span class="pill-red">✗ ${score.wrong}</span>`;
  sec.appendChild(pills);
}

function renderDone(sec,pct,correct,total,onBack,onRetry){
  const g=gradeInfo(pct);
  const gc=div({class:'grade-card',style:`background:${g.bg};border:1.5px solid ${g.color}33`});
  gc.innerHTML=`<div class="grade-pct" style="color:${g.color}">${pct}%</div><div class="grade-sub">${correct} / ${total} 정답</div><div class="grade-label" style="color:${g.color}">${g.label}</div>`;
  sec.appendChild(gc);
  const row=div({style:'display:flex;gap:10px'});
  row.appendChild(btn({class:'btn-outline',onClick:onBack},['← 뒤로']));
  row.appendChild(btn({class:'btn-outline',onClick:onRetry},['다시 풀기 🔄']));
  sec.appendChild(row);
}

// ── Init ──────────────────────────────────────────────────
_count=getSavedCount();
const _savedUser=localStorage.getItem(USER_KEY);
if(!_savedUser){
  render('login');
} else {
  // Sync latest words from Supabase in background
  sbLoadWords(_savedUser).then(text=>{
    if(text) localStorage.setItem(_savedUser+':'+WORDS_KEY, text);
  }).catch(()=>{}).finally(()=>{ render('input'); });
}
</script>
